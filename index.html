<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>월간 제품 기획 아이디어 평가</title>
  <style>
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;background:#f7f7f7;color:#171717}
    .wrap{max-width:1080px;margin:0 auto;padding:32px 16px}.badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
    .badge{display:inline-flex;align-items:center;padding:6px 12px;border-radius:999px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.06);font-size:13px;color:#444}.badge.dark{background:#171717;color:white}
    h1{margin:0;font-size:clamp(28px,4vw,42px);letter-spacing:-.04em}.desc{max-width:680px;color:#666;line-height:1.6;font-size:14px;margin-top:12px}
    .tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:360px;margin:28px 0}button{border:0;border-radius:16px;height:44px;padding:0 18px;cursor:pointer;font-weight:700;font-size:14px}
    .tab{background:#fff;color:#333}.tab.active,.primary{background:#171717;color:#fff}.secondary{background:#fff;color:#333;border:1px solid #ddd}.primary:disabled,.secondary:disabled{opacity:.35;cursor:not-allowed}
    .grid{display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start}.card{background:#fff;border:1px solid #e5e5e5;border-radius:24px;box-shadow:0 1px 4px rgba(0,0,0,.04);margin-bottom:16px}.card-body{padding:20px}
    label{display:block;font-weight:700;font-size:14px;margin:0 0 8px}input,select,textarea{width:100%;border:1px solid #ddd;border-radius:16px;padding:0 14px;font:inherit;outline:none;background:white}input,select{height:44px}textarea{min-height:110px;padding-top:12px;line-height:1.5;resize:vertical}input:focus,select:focus,textarea:focus{border-color:#777}.mt{margin-top:16px}
    .rating-title{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:14px}.rating-title strong{display:block;margin-bottom:6px}.guide{color:#666;font-size:14px;line-height:1.5}.score-badge{flex:0 0 auto;background:#f2f2f2;border-radius:999px;padding:7px 12px;font-size:13px;font-weight:700}
    .scores{display:flex;flex-wrap:wrap;gap:8px}.score{width:36px;height:36px;padding:0;border:1px solid #ddd;background:white;color:#555;border-radius:12px;font-weight:800}.score.selected{background:#171717;color:white;border-color:#171717}
    .sticky{position:sticky;top:20px}.total{font-size:42px;font-weight:900;letter-spacing:-.04em;margin:4px 0 18px}.total span{font-size:18px;color:#999}.score-line{display:flex;justify-content:space-between;color:#666;font-size:14px;margin:10px 0}.score-line b{color:#171717}
    .status{padding:14px 18px;background:white;border:1px solid #e5e5e5;border-radius:20px;margin:18px 0;color:#444;font-size:14px}.result-head{display:flex;flex-wrap:wrap;justify-content:space-between;gap:14px;align-items:center}.result-actions{display:flex;flex-wrap:wrap;gap:8px}
    .rankline{display:flex;flex-wrap:wrap;justify-content:space-between;gap:16px;align-items:center;margin-bottom:18px}.rank-title{display:flex;align-items:center;gap:8px}.rank{background:#171717;color:white;border-radius:999px;padding:6px 12px;font-size:13px;font-weight:800}.avg-total{font-size:32px;font-weight:900;text-align:right}.avg-total span{font-size:16px;color:#999}
    .metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.metric{background:#f7f7f7;border-radius:16px;padding:14px}.metric small{display:block;color:#666;margin-bottom:6px}.metric b{font-size:20px}.comments{margin-top:18px;background:#f7f7f7;border-radius:16px;padding:14px}.comments ul{margin:8px 0 0;padding-left:18px;color:#555;line-height:1.6;font-size:14px}.empty{text-align:center;padding:34px;color:#777}.hidden{display:none!important}
    @media(max-width:820px){.wrap{padding:24px 14px}.grid{grid-template-columns:1fr}.sticky{position:static}.metric-grid{grid-template-columns:1fr}.result-actions{width:100%}.result-actions select,.result-actions button{width:100%}.tabs{max-width:none}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badges"><span class="badge">익명 평가</span><span class="badge">3개 항목 · 30점 만점</span><span class="badge dark">전체 합산 모드</span></div>
    <h1>월간 제품 기획 아이디어 평가</h1>
    <p class="desc">이름을 입력하지 않고 아이디어별로 점수를 남길 수 있는 익명 평가 페이지입니다. 각 항목은 1점부터 10점까지 선택하며, 총점은 30점 만점입니다.</p>
    <div id="status" class="status hidden"></div>
    <div class="tabs"><button id="tabEvaluate" class="tab active" type="button">평가하기</button><button id="tabResults" class="tab" type="button">결과 보기</button></div>
    <section id="evaluateView">
      <div class="grid">
        <div>
          <div class="card"><div class="card-body">
            <label for="evaluationMonth">평가 월</label><input id="evaluationMonth" type="month" />
            <label for="ideaName" class="mt">평가할 아이디어</label>
            <select id="ideaName"><option>아이디어 1</option><option>아이디어 2</option><option>아이디어 3</option><option>아이디어 4</option><option>아이디어 5</option><option>아이디어 6</option><option>아이디어 7</option><option>아이디어 8</option><option>아이디어 9</option><option>직접 입력</option></select>
            <input id="customIdea" class="mt hidden" placeholder="아이디어명을 입력하세요" />
          </div></div>
          <div id="ratings"></div>
          <div class="card"><div class="card-body"><label for="comment">추가 의견</label><textarea id="comment" placeholder="좋았던 점, 보완하면 좋을 점을 자유롭게 작성하세요. 이름은 쓰지 않아도 됩니다."></textarea></div></div>
        </div>
        <aside class="sticky"><div class="card"><div class="card-body">
          <div style="color:#666;font-size:14px;">현재 총점</div><div class="total"><span id="totalScore">0</span><span> / 30</span></div>
          <div id="summaryScores"></div>
          <button id="submitBtn" class="primary" type="button" style="width:100%;margin-top:16px;">익명으로 제출하기</button>
          <button id="resetBtn" class="secondary" type="button" style="width:100%;margin-top:8px;">새 평가 작성</button>
          <p style="font-size:12px;line-height:1.6;color:#777;margin:14px 0 0;">이름은 수집하지 않습니다. 제출 결과는 공용 시트에 저장됩니다.</p>
        </div></div></aside>
      </div>
    </section>
    <section id="resultsView" class="hidden">
      <div class="card"><div class="card-body result-head"><div><strong>평가 결과</strong><div id="resultCount" style="margin-top:6px;color:#666;font-size:14px;">선택한 월 기준 총 0건의 익명 평가가 합산되어 있습니다.</div></div><div class="result-actions"><select id="resultMonth"></select><button id="refreshBtn" class="secondary" type="button">새로고침</button><button id="csvBtn" class="primary" type="button">CSV 다운로드</button></div></div></div>
      <div id="resultList"></div>
    </section>
  </div>
<script>
const GOOGLE_SHEET_WEB_APP_URL="https://script.google.com/macros/s/AKfycbwZ7fhz0GtYBUgPiH-D1nD7npQ-mfaOghRhcOUEvhLbSwP5K7Qk6_pWk13EY4_ASZ9m/exec";
const criteria=[{key:"trend",label:"트렌드 강도",guide:"실제로 요즘 올라오는 흐름인가? 검색, SNS, 판매 근거가 있는가?"},{key:"brand",label:"브랜드 적합성",guide:"로마네 / 브런치브라더 캐릭터와 자연스럽게 어울리는가? 억지스럽지 않은가?"},{key:"purchase",label:"구매 매력도",guide:"소비자 입장에서 사고 싶거나 선물하고 싶은가?"}];
const state={scores:{trend:0,brand:0,purchase:0},records:[],submitted:false};
function getCurrentMonth(){const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`}
function showStatus(m){const e=document.getElementById("status");if(!m){e.classList.add("hidden");e.textContent="";return}e.textContent=m;e.classList.remove("hidden")}
function normalizeRecord(r){const s={trend:Number(r.scores?.trend??r.trend??0),brand:Number(r.scores?.brand??r.brand??0),purchase:Number(r.scores?.purchase??r.purchase??0)};return{id:r.id||crypto.randomUUID(),evaluationMonth:r.evaluationMonth||r.month||getCurrentMonth(),ideaName:r.ideaName||"미지정 아이디어",scores:s,total:Number(r.total??s.trend+s.brand+s.purchase),comment:r.comment||"",createdAt:r.createdAt||new Date().toISOString()}}
function renderRatings(){document.getElementById("ratings").innerHTML=criteria.map(i=>`<div class="card"><div class="card-body"><div class="rating-title"><div><strong>${i.label}</strong><div class="guide">${i.guide}</div></div><div class="score-badge"><span id="${i.key}Value">0</span> / 10</div></div><div class="scores">${Array.from({length:10},(_,n)=>`<button type="button" class="score" data-key="${i.key}" data-score="${n+1}">${n+1}</button>`).join("")}</div></div></div>`).join("");document.querySelectorAll(".score").forEach(b=>b.addEventListener("click",()=>{state.scores[b.dataset.key]=Number(b.dataset.score);state.submitted=false;updateScores()}))}
function getActiveIdea(){const s=document.getElementById("ideaName").value;return s==="직접 입력"?document.getElementById("customIdea").value.trim():s}
function updateScores(){criteria.forEach(i=>{document.getElementById(`${i.key}Value`).textContent=state.scores[i.key]||0;document.querySelectorAll(`.score[data-key="${i.key}"]`).forEach(b=>b.classList.toggle("selected",Number(b.dataset.score)===state.scores[i.key]))});const total=criteria.reduce((a,i)=>a+Number(state.scores[i.key]||0),0);document.getElementById("totalScore").textContent=total;document.getElementById("summaryScores").innerHTML=criteria.map(i=>`<div class="score-line"><span>${i.label}</span><b>${state.scores[i.key]||0}점</b></div>`).join("");const ok=getActiveIdea()&&criteria.every(i=>state.scores[i.key]>0);const btn=document.getElementById("submitBtn");btn.disabled=!ok||state.submitted;btn.textContent=state.submitted?"제출 완료":"익명으로 제출하기"}
async function loadCloudRecords(){showStatus("");try{const res=await fetch(GOOGLE_SHEET_WEB_APP_URL);if(!res.ok)throw new Error();const data=await res.json();state.records=Array.isArray(data.records)?data.records.map(normalizeRecord):[];renderResultMonthOptions();renderResults();showStatus("전체 평가 결과를 최신 상태로 불러왔습니다.")}catch(e){showStatus("전체 결과를 불러오지 못했습니다. Google Sheet 연결 설정을 확인해주세요.")}}
async function submitEvaluation(){const total=criteria.reduce((a,i)=>a+Number(state.scores[i.key]||0),0);const record={id:crypto.randomUUID(),evaluationMonth:document.getElementById("evaluationMonth").value||getCurrentMonth(),ideaName:getActiveIdea(),scores:state.scores,total,comment:document.getElementById("comment").value.trim(),createdAt:new Date().toISOString()};document.getElementById("submitBtn").disabled=true;document.getElementById("submitBtn").textContent="제출 중";try{await fetch(GOOGLE_SHEET_WEB_APP_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(record)});state.submitted=true;showStatus("익명 평가가 제출되었습니다. 결과 보기에서 전체 합산을 확인할 수 있습니다.");updateScores();setTimeout(loadCloudRecords,1000)}catch(e){showStatus("제출에 실패했습니다. Google Sheet 연결 설정을 확인해주세요.");state.submitted=false;updateScores()}}
function resetForm(){state.scores={trend:0,brand:0,purchase:0};state.submitted=false;document.getElementById("comment").value="";showStatus("");updateScores()}
function renderResultMonthOptions(){const c=getCurrentMonth();const m=Array.from(new Set(state.records.map(r=>r.evaluationMonth).filter(Boolean)));if(!m.includes(c))m.push(c);m.sort().reverse();const s=document.getElementById("resultMonth");const p=s.value||c;s.innerHTML=m.map(x=>`<option value="${x}">${x}</option>`).join("");s.value=m.includes(p)?p:m[0]}
function escapeHtml(v){return String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function renderResults(){const month=document.getElementById("resultMonth").value||getCurrentMonth();const f=state.records.filter(r=>r.evaluationMonth===month);document.getElementById("resultCount").textContent=`선택한 월 기준 총 ${f.length}건의 익명 평가가 합산되어 있습니다.`;const groups={};f.forEach(r=>{if(!groups[r.ideaName])groups[r.ideaName]={ideaName:r.ideaName,count:0,total:0,criteriaTotals:{trend:0,brand:0,purchase:0},comments:[]};groups[r.ideaName].count++;groups[r.ideaName].total+=r.total;criteria.forEach(i=>groups[r.ideaName].criteriaTotals[i.key]+=Number(r.scores[i.key]||0));if(r.comment)groups[r.ideaName].comments.push(r.comment)});const grouped=Object.values(groups).sort((a,b)=>b.total/b.count-a.total/a.count);const list=document.getElementById("resultList");if(!grouped.length){list.innerHTML=`<div class="card"><div class="empty">아직 제출된 평가가 없습니다.</div></div>`;return}list.innerHTML=grouped.map((g,idx)=>`<div class="card"><div class="card-body"><div class="rankline"><div><div class="rank-title"><span class="rank">${idx+1}위</span><h2 style="margin:0;font-size:22px;">${escapeHtml(g.ideaName)}</h2></div><div style="margin-top:8px;color:#666;font-size:14px;">응답 ${g.count}건</div></div><div><div style="font-size:14px;color:#666;text-align:right;">평균 총점</div><div class="avg-total">${(g.total/g.count).toFixed(1)}<span> / 30</span></div></div></div><div class="metric-grid">${criteria.map(i=>`<div class="metric"><small>${i.label}</small><b>${(g.criteriaTotals[i.key]/g.count).toFixed(1)}</b></div>`).join("")}</div>${g.comments.length?`<div class="comments"><strong>익명 의견</strong><ul>${g.comments.map(t=>`<li>${escapeHtml(t)}</li>`).join("")}</ul></div>`:""}</div></div>`).join("")}
function downloadCSV(){const headers=["평가 월","아이디어",...criteria.map(i=>i.label),"총점","의견","제출일"];const rows=state.records.map(r=>[r.evaluationMonth,r.ideaName,...criteria.map(i=>r.scores[i.key]),r.total,r.comment||"",r.createdAt]);const csv=[headers,...rows].map(row=>row.map(cell=>`"${String(cell).replaceAll('"','""')}"`).join(",")).join("\n");const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="익명_아이디어_평가_결과.csv";a.click();URL.revokeObjectURL(url)}
function switchMode(mode){const ev=mode==="evaluate";document.getElementById("evaluateView").classList.toggle("hidden",!ev);document.getElementById("resultsView").classList.toggle("hidden",ev);document.getElementById("tabEvaluate").classList.toggle("active",ev);document.getElementById("tabResults").classList.toggle("active",!ev);if(!ev)loadCloudRecords()}
document.getElementById("evaluationMonth").value=getCurrentMonth();document.getElementById("resultMonth").addEventListener("change",renderResults);document.getElementById("ideaName").addEventListener("change",()=>{document.getElementById("customIdea").classList.toggle("hidden",document.getElementById("ideaName").value!=="직접 입력");state.submitted=false;updateScores()});document.getElementById("customIdea").addEventListener("input",updateScores);document.getElementById("submitBtn").addEventListener("click",submitEvaluation);document.getElementById("resetBtn").addEventListener("click",resetForm);document.getElementById("refreshBtn").addEventListener("click",loadCloudRecords);document.getElementById("csvBtn").addEventListener("click",downloadCSV);document.getElementById("tabEvaluate").addEventListener("click",()=>switchMode("evaluate"));document.getElementById("tabResults").addEventListener("click",()=>switchMode("results"));renderRatings();renderResultMonthOptions();updateScores();loadCloudRecords();
</script>
</body>
</html>
